    <title>Smart Campus</title>
    <script>
function applySavedColorScheme() {
  let savedScheme = localStorage.getItem('colorScheme');

  if (savedScheme !== 'dark' && savedScheme !== 'light') {
    // Ustaw domyślną wartość jeśli nie ma
    savedScheme = 'light';
    localStorage.setItem('colorScheme', savedScheme);
  }

  document.documentElement.style.setProperty('colorScheme', savedScheme);
}

    </script>
  </head>
  <body onload="applySavedColorScheme();">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
